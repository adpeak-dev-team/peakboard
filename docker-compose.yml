services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "rkwkrh13!#"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./pb-back/lib/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prkwkrh13!#"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./pb-back
    environment:
      HOST: mysql
      DBPWD: "rkwkrh13!#"
      SHEMA: peakboard
      PORT: 3050
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3050:3050"

  frontend:
    build: ./pb-front
    environment:
      PORT: 3030
    depends_on:
      - backend
    ports:
      - "3030:3030"

volumes:
  mysql_data:
